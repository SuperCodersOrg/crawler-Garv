# Crawler Configuration File

# Seed URL to begin crawling from
seed_url = https://codequotient.com/

# MySQL Database credentials
mysql_host = 127.0.0.1
mysql_user = root
mysql_password = 8305
mysql_database = crawler
mysql_port = 3306

# Crawling Limits
# Use -1 for unlimited max_depth and max_pages
max_depth = 2
max_pages = 100

# Crawling Domain rule
# If true, crawler stays on the same domain as the seed URL
same_domain = true

# Browser Settings
# Set headless = true for headless mode, or false for headful mode
headless = false

# Timeout Values
# HTTP Fetcher timeout configuration (seconds)
http_timeout_seconds = 10
http_connect_timeout_seconds = 5

# Browser CDP connection configuration
browser_connect_retries = 15
browser_connect_delay_ms = 200

# Rendering Thresholds
# Minimum HTML body length in bytes. If smaller, page triggers JS rendering.
render_min_size = 300
