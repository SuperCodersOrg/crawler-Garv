# Crawler Configuration File

# Seed URL to begin crawling from
seed_url = https://codequotient.com/

# MySQL Database credentials
mysql_host = 127.0.0.1
mysql_user = root
mysql_password = 8305
mysql_database = crawler
mysql_port = 3306

# Crawling Limits
# Use -1 for unlimited max_depth and max_pages
max_depth = 2
max_pages = 100

# Crawling Domain rule
# If true, crawler stays on the same domain as the seed URL
same_domain = true

# Resume Crawl settings
# Options for resume_mode:
# resume: Resume the previous crawl from the database table state.
# clear:  Truncate and reset all database tables to start a fresh crawl.
# keep:   Keep previous database entries, but start a fresh crawl from seeds anyway.
# If resume_mode is not defined it falls back to the resume_crawl boolean toggle.
resume_mode = clear

# Browser Settings
# Set headless = true for headless mode, or false for headful mode
headless = false

# Browser CDP connection configuration
browser_connect_retries = 15
browser_connect_delay_ms = 200

# Rendering Thresholds
# Minimum HTML body length in bytes. If smaller, page triggers JS rendering.
render_min_size = 300
